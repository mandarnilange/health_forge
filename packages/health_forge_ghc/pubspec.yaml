name: health_forge_ghc
description: >-
  Google Health Connect adapter for health_forge — reads 14 health metric types
  from Health Connect and maps them to the unified health_forge data model.
version: 0.1.1
homepage: https://github.com/mandarnilange/health_forge
repository: https://github.com/mandarnilange/health_forge/tree/main/packages/health_forge_ghc
issue_tracker: https://github.com/mandarnilange/health_forge/issues
topics:
  - health
  - health-connect
  - android
  - wearables
  - google

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  health: ^13.3.1
  health_forge_core: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0
