name: health_forge_strava
description: >-
  Strava REST API adapter for health_forge — fetches workouts, heart rate,
  calories, distance, and elevation data via OAuth 2.0 PKCE with page-based
  pagination and dual rate limiting.
version: 0.1.0
homepage: https://github.com/mandarnilange/health_forge
repository: https://github.com/mandarnilange/health_forge/tree/main/packages/health_forge_strava
issue_tracker: https://github.com/mandarnilange/health_forge/issues
topics:
  - health
  - strava
  - fitness
  - workout
  - rest-api

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

resolution: workspace

dependencies:
  crypto: ^3.0.6
  dio: ^5.9.2
  flutter:
    sdk: flutter
  health_forge_core: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0
