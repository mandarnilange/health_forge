name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.1)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      # Check out using a PAT so the tag push triggers downstream workflows.
      # GitHub's anti-loop protection silently suppresses workflow events for
      # pushes authenticated with the default GITHUB_TOKEN. Configure a fine-
      # grained PAT with `contents: write` and store it as RELEASE_PAT.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}

      - name: Create and push tag
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          git tag "v${RELEASE_VERSION}"
          git push origin "v${RELEASE_VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_PAT }}
          tag_name: "v${{ inputs.version }}"
          name: "v${{ inputs.version }}"
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
