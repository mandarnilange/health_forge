name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: dart pub get

      - name: Bootstrap
        run: dart run melos bootstrap

      - name: Generate
        run: dart run melos run generate --no-select

      - name: Analyze
        run: dart run melos run analyze --no-select

      - name: Analyze example
        run: cd example && dart analyze --fatal-infos

      - name: Format
        run: dart run melos run format --no-select

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Test with coverage (packages)
        run: dart run melos run test:coverage --no-select

      - name: Test example app (no coverage gate)
        run: cd example && flutter test

      - name: Merge package coverage (optional report)
        run: bash tool/merge_lcov.sh

      - name: Verify per-package coverage (>=90%, example excluded)
        run: dart run tool/verify_packages_coverage.dart

      - name: Upload merged package lcov
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-lcov-packages
          path: coverage/lcov.info
